dustry \u2014 blue hat"}, {"color": "#777777", "font": {"color": "white"}, "id": "e14", "label": "competition", "shape": "dot", "size": 22, "title": "risk \u2014 black hat"}, {"color": "#777777", "font": {"color": "white"}, "id": "e15", "label": "operational costs", "shape": "dot", "size": 22, "title": "risk \u2014 black hat"}]);
